name: Meta Early Warning Alert - MLB

on:
  schedule:
    # 매시 정각 실행 (UTC 기준)
    # KST 07:00 ~ 익일 01:00 = UTC 22:00 ~ 16:00
    - cron: '0 0-16,22,23 * * *'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # alert_sent_log.json을 실행 간 유지하기 위해 cache 사용
      - name: Restore alert sent log
        uses: actions/cache@v4.2.0
        with:
          path: alert_sent_log.json
          key: alert-log-${{ github.run_id }}
          restore-keys: |
            alert-log-

      - name: Debug Snowflake credentials
        env:
          SNOWFLAKE_ACCOUNT:       ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:          ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY:   ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          pip install cryptography
          python << 'PYEOF'
          import os, base64, hashlib
          from cryptography.hazmat.primitives.serialization import load_pem_private_key, Encoding, PublicFormat

          user = os.environ.get('SNOWFLAKE_USER', '')
          account = os.environ.get('SNOWFLAKE_ACCOUNT', '')
          pem_str = os.environ.get('SNOWFLAKE_PRIVATE_KEY', '')

          print(f"USER repr: {user!r} (len={len(user)})")
          print(f"ACCOUNT len: {len(account)}")
          print(f"PEM length: {len(pem_str)}")
          print(f"PEM first 30: {pem_str[:30]!r}")
          print(f"PEM last 30: {pem_str[-30:]!r}")
          print(f"BEGIN marker present: {'-----BEGIN PRIVATE KEY-----' in pem_str}")
          print(f"END marker present: {'-----END PRIVATE KEY-----' in pem_str}")
          print(f"Newline count: {pem_str.count(chr(10))}")
          print(f"Has literal backslash-n: {'\\n' in pem_str}")

          pem = pem_str.replace("\\n", "\n").encode()
          try:
              key = load_pem_private_key(pem, password=None)
              pub = key.public_key().public_bytes(Encoding.DER, PublicFormat.SubjectPublicKeyInfo)
              fp = base64.b64encode(hashlib.sha256(pub).digest()).decode()
              print(f"FINGERPRINT: SHA256:{fp}")
          except Exception as e:
              print(f"PARSE ERROR: {type(e).__name__}: {e}")
          PYEOF

      - name: Run Meta Alert
        env:
          META_ACCESS_TOKEN:       ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:      ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION:        ${{ secrets.META_API_VERSION }}
          SNOWFLAKE_ACCOUNT:       ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:          ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY:   ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_WAREHOUSE:     ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE:      ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA:        ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_ROLE:          ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_TABLE:         ${{ secrets.SNOWFLAKE_TABLE }}
          SMTP_SERVER:             ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:               ${{ secrets.SMTP_PORT }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          ALERT_RECIPIENTS:        ${{ secrets.ALERT_RECIPIENTS }}
          ALERT_RECIPIENTS_KIDS:   ${{ secrets.ALERT_RECIPIENTS_KIDS }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:            ${{ secrets.GEMINI_MODEL }}
          SLACK_WEBHOOK_URL:       ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_KIDS:  ${{ secrets.SLACK_WEBHOOK_URL_KIDS }}
        run: python app.py
